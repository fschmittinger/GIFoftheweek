<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GIF of the Week — UCD+ Team</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#0d0d0d; --paper:#fdfaf4; --cream:#f0e8d8; --border:#cfc4ae; --muted:#888070;
  --r:8px;
  --fd:'Bebas Neue',sans-serif; --fb:'DM Sans',sans-serif;
  /* Rainbow */
  --r1:#ff2d55; --r2:#ff7b00; --r3:#ffd000;
  --r4:#28c840; --r5:#00bcd4; --r6:#1a4fff; --r7:#9b27e8; --r8:#e8178a;
  --rb:linear-gradient(90deg,var(--r1),var(--r2),var(--r3),var(--r4),var(--r5),var(--r6),var(--r7),var(--r8));
}
html{background:var(--paper);color:var(--ink);font-family:var(--fb);font-size:15px;line-height:1.5;min-height:100%}
.app{max-width:560px;margin:0 auto;padding-bottom:80px}

/* ── HEADER ── */
header{background:var(--ink);padding:18px 20px 16px;position:relative;overflow:hidden}
header::after{content:'';display:block;height:5px;background:var(--rb);margin-top:16px;margin-left:-20px;margin-right:-20px}
.hdr-team{font-size:10px;font-weight:500;letter-spacing:.22em;text-transform:uppercase;margin-bottom:2px;
  background:var(--rb);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hdr-title{font-family:var(--fd);font-size:42px;line-height:1;color:#fff;letter-spacing:.02em}

/* ── TABS ── */
.tabs{display:grid;margin-bottom:0}
.t3{grid-template-columns:repeat(3,1fr)}.t4{grid-template-columns:repeat(4,1fr)}
.tab{
  padding:13px 4px 11px;text-align:center;font-family:var(--fd);font-size:18px;letter-spacing:.07em;
  background:var(--cream);border:none;border-right:1.5px solid var(--border);border-bottom:3px solid transparent;
  color:var(--muted);cursor:pointer;transition:all .15s
}
.tab:last-child{border-right:none}
.ts.active{color:var(--r2);background:#fff7ee;border-bottom-color:var(--r2)}
.tv.active{color:var(--r6);background:#eef2ff;border-bottom-color:var(--r6)}
.ta.active{color:var(--r7);background:#f5eeff;border-bottom-color:var(--r7)}
.tx.active{color:var(--r1);background:#fff0f3;border-bottom-color:var(--r1)}
.ts:hover:not(.active){color:var(--r2);background:#fffaf5}
.tv:hover:not(.active){color:var(--r6);background:#f0f4ff}
.ta:hover:not(.active){color:var(--r7);background:#faf0ff}
.tx:hover:not(.active){color:var(--r1);background:#fff5f7}
.tabs-border{height:3px;background:var(--rb);margin-bottom:24px}

/* ── SCREENS ── */
.screen{display:none;padding:0 20px}.screen.active{display:block}

/* ── FORM ── */
.lbl{font-size:10px;font-weight:500;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);margin-bottom:7px}
input[type=text],input[type=password],textarea{
  width:100%;padding:10px 13px;background:#fff;border:2px solid var(--border);
  border-radius:var(--r);font-family:var(--fb);font-size:14px;color:var(--ink);
  outline:none;transition:border-color .15s;display:block;margin-bottom:14px
}
input:focus,textarea:focus{border-color:var(--ink)}
textarea{resize:none;height:68px;line-height:1.5}

/* ── CTA BUTTONS ── */
.cta{
  display:flex;align-items:center;justify-content:center;gap:8px;width:100%;
  padding:15px 20px;font-family:var(--fd);font-size:22px;letter-spacing:.07em;
  border-radius:var(--r);border:none;color:#fff;cursor:pointer;
  transition:opacity .15s,transform .1s;margin-bottom:10px
}
.cta:hover{opacity:.88}.cta:active{transform:scale(.98)}
.co{background:linear-gradient(120deg,var(--r2),#ffaa00)}
.cb{background:linear-gradient(120deg,var(--r6),#4d6fff)}
.cg{background:linear-gradient(120deg,var(--r4),#00e060)}
.cr{background:linear-gradient(120deg,var(--r1),#ff5577)}
.cp{background:linear-gradient(120deg,var(--r7),#bb44ff)}
.cm{background:linear-gradient(120deg,var(--r8),#ff55cc)}
.cra{background:var(--rb)}

/* ── SMALL BUTTONS ── */
.btn{
  display:inline-flex;align-items:center;gap:6px;padding:9px 15px;
  font-family:var(--fb);font-size:13px;font-weight:500;border-radius:var(--r);
  border:2px solid var(--border);background:#fff;color:var(--ink);
  cursor:pointer;transition:all .15s;white-space:nowrap
}
.btn:hover{border-color:var(--ink);background:var(--cream)}.btn:active{transform:scale(.97)}
.bd{border-color:var(--r1);color:var(--r1)}.bd:hover{background:var(--r1);color:#fff;border-color:var(--r1)}
.bg{border-color:var(--r4);color:var(--r4)}.bg:hover{background:var(--r4);color:#fff;border-color:var(--r4)}
.bw{border-color:var(--r2);color:var(--r2)}.bw:hover{background:var(--r2);color:#fff;border-color:var(--r2)}
.bp{border-color:var(--r7);color:var(--r7)}.bp:hover{background:var(--r7);color:#fff;border-color:var(--r7)}

/* ── GIF PREVIEW (iframe embed — works when hosted, shows placeholder in sandbox) ── */
.prev-wrap{
  width:100%;aspect-ratio:16/9;background:var(--cream);
  border:2px solid var(--border);border-radius:var(--r);
  overflow:hidden;position:relative;margin-bottom:14px
}
.prev-wrap iframe{position:absolute;inset:0;width:100%;height:100%;border:none}
.prev-ph{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;color:var(--muted);font-size:13px;line-height:1.8;padding:16px}
.prev-ph .ico{font-size:36px;display:block;margin-bottom:6px}
/* Loading shimmer */
.prev-wrap.loading::before{content:'';position:absolute;inset:0;background:linear-gradient(90deg,var(--cream) 25%,#e8e0ce 50%,var(--cream) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;z-index:1}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* ── SUBMISSION ROW ── */
.sub-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--cream)}
.sub-row:last-child{border-bottom:none}
.sub-th{width:60px;height:44px;border-radius:5px;overflow:hidden;flex-shrink:0;background:var(--cream);border:1.5px solid var(--border);position:relative}
.sub-th iframe{position:absolute;inset:0;width:100%;height:100%;border:none;pointer-events:none}
.sub-th.hid{display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:20px}
.sub-info{flex:1;min-width:0}
.sub-tl{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sub-mt{font-size:11px;color:var(--muted)}
.sub-n{font-family:var(--fd);font-size:16px;background:var(--cream);border:1.5px solid var(--border);padding:2px 9px;border-radius:var(--r);flex-shrink:0;color:var(--muted)}

/* ── VOTE GRID ── */
.gif-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.gif-card{border:2.5px solid var(--border);border-radius:var(--r);overflow:hidden;background:#fff;cursor:pointer;transition:all .15s;position:relative}
.gif-card:hover:not(.no-vote){border-color:var(--r6);transform:translateY(-2px)}
.gif-card.voted{border-color:var(--r6);box-shadow:0 0 0 3px rgba(26,79,255,.18)}
.gif-card.voted2{border-color:var(--r4);box-shadow:0 0 0 3px rgba(40,200,64,.18)}
.gif-card.won{border-color:var(--r4);box-shadow:0 0 0 4px rgba(40,200,64,.22)}
.gif-card-th{width:100%;aspect-ratio:4/3;overflow:hidden;background:var(--cream);position:relative}
.gif-card-th iframe{position:absolute;inset:0;width:100%;height:100%;border:none;pointer-events:none}
.gif-card-body{padding:8px 10px}
.gif-card-tl{font-size:12px;font-weight:500;margin-bottom:2px}
.gif-card-mt{font-size:11px;color:var(--muted)}
.pill{position:absolute;top:6px;right:6px;font-size:10px;font-weight:600;padding:3px 9px;border-radius:20px;color:#fff;z-index:2}
.pb{background:var(--r6)}.pg{background:var(--r4)}.pr{background:var(--r1)}.pm{background:var(--r8)}

/* ── NOTICES ── */
.notice{display:flex;align-items:flex-start;gap:10px;padding:12px 14px;border-radius:var(--r);border-left:4px solid var(--border);background:var(--cream);font-size:13px;margin-bottom:14px;line-height:1.5}
.ni{border-color:var(--r6);background:#e8eeff;color:#0c2890}
.nok{border-color:var(--r4);background:#e4fce0;color:#1a6a0a}
.nw{border-color:var(--r1);background:#ffeceb;color:#a01808}
.na{border-color:var(--r2);background:#fff3e0;color:#8a3800}
.np{border-color:var(--r7);background:#f5eeff;color:#5a0a9a}

/* ── WINNER CARD ── */
.win-card{border:3px solid var(--r4);border-radius:var(--r);overflow:hidden;margin-bottom:16px;background:#fff}
.win-banner{background:linear-gradient(120deg,var(--r4),#00dd55);padding:10px 14px}
.win-banner span{font-family:var(--fd);font-size:18px;letter-spacing:.08em;color:#fff}
.win-frame{width:100%;aspect-ratio:16/9;overflow:hidden;background:var(--cream);position:relative}
.win-frame iframe{position:absolute;inset:0;width:100%;height:100%;border:none;pointer-events:none}
.win-body{padding:14px 16px}
.win-tl{font-size:16px;font-weight:500;margin-bottom:4px}
.win-mt{font-size:12px;color:var(--muted)}

/* ── ARCHIVE ── */
.arc-week{border:2px solid var(--border);border-radius:var(--r);margin-bottom:12px;overflow:hidden}
.arc-hdr{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:var(--cream);border-bottom:1.5px solid var(--border)}
.arc-title{font-family:var(--fd);font-size:19px;letter-spacing:.04em;background:var(--rb);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.arc-date{font-size:11px;color:var(--muted)}
.arc-winner{display:flex;align-items:center;gap:10px;padding:12px 14px;background:#fff}
.arc-th{width:68px;height:50px;border-radius:5px;overflow:hidden;flex-shrink:0;background:var(--cream);border:1.5px solid var(--border);position:relative}
.arc-th iframe{position:absolute;inset:0;width:100%;height:100%;border:none;pointer-events:none}
.aw-lbl{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--r4);font-weight:600}
.aw-tl{font-size:13px;font-weight:500}
.aw-nm{font-size:11px;color:var(--muted)}

/* ── ADMIN PANEL ── */
.adm{border:3px solid;border-image:var(--rb) 1;border-radius:0;overflow:hidden;margin-bottom:16px}
.adm-hdr{background:var(--rb);padding:12px 16px}
.adm-hdr-t{font-family:var(--fd);font-size:22px;letter-spacing:.06em;color:#fff}
.adm-sec{padding:14px 16px;border-bottom:1.5px solid var(--cream);background:#fff}
.adm-sec:last-child{border-bottom:none}
.adm-sec-t{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);margin-bottom:10px}
.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.stat-box{border-radius:var(--r);padding:10px;text-align:center;border:2px solid;position:relative;overflow:hidden}
.stat-box::before{content:'';position:absolute;inset:0;opacity:.08}
.sb1{border-color:var(--r2)}.sb1::before{background:var(--r2)}.sb1 .stat-n{color:var(--r2)}
.sb2{border-color:var(--r6)}.sb2::before{background:var(--r6)}.sb2 .stat-n{color:var(--r6)}
.sb3{border-color:var(--r7)}.sb3::before{background:var(--r7)}.sb3 .stat-n{color:var(--r7)}
.stat-n{font-family:var(--fd);font-size:32px;color:var(--ink);line-height:1;position:relative}
.stat-l{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-top:2px;position:relative}
.status-chip{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:500;padding:5px 12px;border-radius:20px}
.sc-open{background:#fff3e0;color:#8a3800}
.sc-vote{background:#e8eeff;color:#0c2890}
.sc-done{background:#e4fce0;color:#1a6a0a}
/* Rainbow left borders on sub rows */
.sub-stripe-0{border-left:3px solid var(--r1);padding-left:6px}
.sub-stripe-1{border-left:3px solid var(--r2);padding-left:6px}
.sub-stripe-2{border-left:3px solid var(--r3);padding-left:6px}
.sub-stripe-3{border-left:3px solid var(--r4);padding-left:6px}
.sub-stripe-4{border-left:3px solid var(--r5);padding-left:6px}
.sub-stripe-5{border-left:3px solid var(--r6);padding-left:6px}
.sub-stripe-6{border-left:3px solid var(--r7);padding-left:6px}
.sub-stripe-7{border-left:3px solid var(--r8);padding-left:6px}

/* ── MODAL OVERLAY (replaces confirm()) ── */
.modal-backdrop{
  position:fixed;inset:0;background:rgba(0,0,0,.55);
  display:flex;align-items:center;justify-content:center;
  z-index:1000;padding:20px;backdrop-filter:blur(2px)
}
.modal{
  background:#fff;border-radius:12px;padding:28px 24px;
  max-width:340px;width:100%;text-align:center;
  border-top:5px solid transparent;border-image:var(--rb) 1;
  animation:pop .15s ease-out
}
@keyframes pop{from{transform:scale(.92);opacity:0}to{transform:scale(1);opacity:1}}
.modal-icon{font-size:36px;display:block;margin-bottom:10px}
.modal-title{font-family:var(--fd);font-size:22px;letter-spacing:.04em;margin-bottom:8px;
  background:var(--rb);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.modal-msg{font-size:14px;color:var(--muted);margin-bottom:20px;line-height:1.6}
.modal-btns{display:flex;gap:10px;justify-content:center}
.modal-btns .btn{min-width:90px;justify-content:center}

/* ── MISC ── */
hr.dv{border:none;border-top:1.5px solid var(--border);margin:18px 0}
.err{color:var(--r1);font-size:12px;margin-bottom:10px;display:none}
.empty{text-align:center;padding:40px 20px;color:var(--muted);font-size:13px}
.empty .ico{font-size:42px;display:block;margin-bottom:10px}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid currentColor;border-top-color:transparent;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
.login-wrap{min-height:340px;display:flex;align-items:center;justify-content:center;padding:20px 0}
.login-card{background:#fff;border-radius:12px;padding:30px 24px;width:100%;max-width:320px;text-align:center;
  border:3px solid transparent;border-image:var(--rb) 1}
.login-card .ico{font-size:40px;display:block;margin-bottom:10px}
.login-card h2{font-family:var(--fd);font-size:28px;letter-spacing:.05em;margin-bottom:6px;
  background:var(--rb);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.login-card p{font-size:13px;color:var(--muted);margin-bottom:16px}
/* Multi-submit badge */
.sub-limit{font-size:11px;color:var(--muted);text-align:right;margin-top:-10px;margin-bottom:14px}
.sub-limit strong{color:var(--r2)}
/* Vote count badge */
.vote-budget{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 14px;background:var(--cream);border-radius:var(--r);
  margin-bottom:14px;font-size:13px
}
.vote-dots{display:flex;gap:6px}
.vote-dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--r6);background:#fff;transition:background .2s}
.vote-dot.used{background:var(--r6)}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="hdr-team">UCD+ Team</div>
    <div class="hdr-title">GIF OF THE WEEK</div>
  </header>

  <div class="tabs t3" id="tabs">
    <button class="tab ts active" data-tab="s">SUBMIT</button>
    <button class="tab tv"        data-tab="v">VOTE</button>
    <button class="tab ta"        data-tab="a">ARCHIVE</button>
    <button class="tab tx"        data-tab="x" id="tab-x" style="display:none">ADMIN</button>
  </div>
  <div class="tabs-border"></div>

  <!-- SUBMIT -->
  <div class="screen active" id="screen-s">
    <p class="lbl">Your name</p>
    <input type="text" id="in-name" placeholder="e.g. Oliver" maxlength="40">
    <p class="lbl">Giphy link</p>
    <input type="text" id="in-url" placeholder="https://giphy.com/gifs/…">
    <div class="prev-wrap" id="gif-prev">
      <div class="prev-ph"><span class="ico">🎞️</span>Paste a Giphy link above to preview<br><small style="font-size:11px;opacity:.7">(previews visible when hosted)</small></div>
    </div>
    <p class="lbl">Tagline</p>
    <textarea id="in-tag" placeholder="Add a caption for your GIF…" maxlength="120"></textarea>
    <div class="sub-limit" id="sub-limit-msg"></div>
    <p class="err" id="sub-err"></p>
    <button class="cta co" id="btn-submit">SUBMIT GIF</button>
    <hr class="dv">
    <p class="lbl">This week's submissions</p>
    <div id="sub-list"><div class="empty"><span class="ico">📭</span>No submissions yet</div></div>
    <hr class="dv" style="margin-top:8px">
    <p style="font-size:12px;text-align:center;color:var(--muted)">Are you the host? <button class="btn" style="padding:5px 10px;font-size:12px" id="btn-goto-admin">Open Admin →</button></p>
  </div>

  <!-- VOTE -->
  <div class="screen" id="screen-v">
    <div id="vote-content"><div class="empty"><span class="ico">🔒</span>Waiting for host to open voting</div></div>
  </div>

  <!-- ARCHIVE -->
  <div class="screen" id="screen-a">
    <div id="arc-content"><div class="empty"><span class="ico">📚</span>No archived weeks yet</div></div>
  </div>

  <!-- ADMIN -->
  <div class="screen" id="screen-x">
    <div id="adm-content"></div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-backdrop" id="modal" style="display:none">
  <div class="modal">
    <span class="modal-icon" id="modal-icon">❓</span>
    <div class="modal-title" id="modal-title">Confirm</div>
    <div class="modal-msg" id="modal-msg"></div>
    <div class="modal-btns">
      <button class="btn bg" id="modal-yes">✓ Confirm</button>
      <button class="btn"    id="modal-no">✗ Cancel</button>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════════
//  CONFIG
// ══════════════════════════════════════════════════════════
const HOST_PASS    = 'gif2024';
const MAX_SUBS     = 3;   // max submissions per person
const MAX_VOTES    = 2;   // votes each person gets

// ══════════════════════════════════════════════════════════
// ══════════════════════════════════════════════════════════
//  STORAGE — npoint.io shared database (syncs across all devices)
// ══════════════════════════════════════════════════════════
const NPOINT_URL = 'https://api.npoint.io/2b122701eff69ac822d6';

// In-memory cache so we don't fetch on every single read
let _cache = null;
let _cacheTime = 0;
const CACHE_TTL = 8000; // ms — re-fetch if data is older than 8s

function fetchWithTimeout(url, opts, ms=8000) {
  const ctrl = new AbortController();
  const tid = setTimeout(() => ctrl.abort(), ms);
  return fetch(url, { ...opts, signal: ctrl.signal })
    .finally(() => clearTimeout(tid));
}

async function dbFetch() {
  try {
    const r = await fetchWithTimeout(NPOINT_URL, {
      headers: { 'Content-Type': 'application/json' }
    });
    if (!r.ok) throw new Error('HTTP '+r.status);
    _cache = await r.json();
    _cacheTime = Date.now();
    return _cache;
  } catch(e) { console.warn('dbFetch failed:', e.message); return _cache || {}; }
}

async function dbSave(data) {
  _cache = data;
  _cacheTime = Date.now();
  const r = await fetchWithTimeout(NPOINT_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(data)
  });
  if (!r.ok) throw new Error('HTTP '+r.status);
}

// dbGet / dbSet mirror the old API so the rest of the code is unchanged
async function dbGet(k) {
  // Use cache if fresh enough
  const data = (Date.now()-_cacheTime < CACHE_TTL && _cache) ? _cache : await dbFetch();
  return data[k] !== undefined ? data[k] : null;
}

async function dbSet(k, v) {
  // Read latest, patch one key, write back
  const data = (Date.now()-_cacheTime < CACHE_TTL && _cache) ? _cache : await dbFetch();
  data[k] = v;
  await dbSave(data);
}
function lsGet(k,d){ try{const v=localStorage.getItem(k);return v!==null?JSON.parse(v):d;}catch(e){return d;} }
function lsSet(k,v){ try{localStorage.setItem(k,JSON.stringify(v));}catch(e){} }
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmt(d){return d.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});}

// ══════════════════════════════════════════════════════════
//  GIPHY: extract ID → build embed URL
//  giphy.com/embed/ID iframes work in any real browser.
//  Grey in Claude artifact sandbox (nested iframe blocked) — fine when hosted.
// ══════════════════════════════════════════════════════════
function giphyId(raw) {
  const s=(raw||'').trim(); if(!s) return null;
  let m;
  // embed URL: giphy.com/embed/ID
  m=s.match(/giphy\.com\/embed\/([a-zA-Z0-9]+)/i);           if(m) return m[1];
  // i.giphy.com/ID.gif
  m=s.match(/i\.giphy\.com\/([a-zA-Z0-9]+)\.gif/i);          if(m) return m[1];
  // NEW CDN: media4.giphy.com/media/v1.Y2lk.../ID/giphy.gif
  m=s.match(/giphy\.com\/media\/v1\.[^/]+\/([a-zA-Z0-9]+)/i);if(m) return m[1];
  // OLD CDN: media.giphy.com/media/ID/giphy.gif
  m=s.match(/giphy\.com\/media\/([a-zA-Z0-9]+)\//i);         if(m) return m[1];
  // Page URL: giphy.com/gifs/title-words-ID
  m=s.match(/giphy\.com\/gifs\/([a-zA-Z0-9-]+)/i);
  if(m){
    const parts=m[1].split('-'), last=parts[parts.length-1];
    if(/^[a-zA-Z0-9]{10,}$/.test(last)) return last;
    if(parts.length===1 && last.length>=6) return last;
  }
  return null;
}
function gifEmbed(id){
  // img with referrerpolicy="no-referrer" bypasses Giphy's hotlink block in real browsers.
  // onerror falls back to iframe embed (works when hosted on https://).
  // Both appear grey only inside Claude's artifact sandbox — fine when deployed.
  if(!id) return '';
  return `<img
    src="https://media.giphy.com/media/${id}/giphy.gif"
    referrerpolicy="no-referrer"
    crossorigin="anonymous"
    style="width:100%;height:100%;object-fit:cover;display:block;position:absolute;inset:0;"
    loading="lazy"
    onerror="this.style.display='none';var n=this.nextElementSibling;if(n)n.style.display='block';"
    alt="gif"><iframe
    src="https://giphy.com/embed/${id}"
    style="position:absolute;inset:0;width:100%;height:100%;border:none;pointer-events:none;display:none;"
    allowfullscreen scrolling="no" title="gif"></iframe>`;
}

// ══════════════════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════════════════
let state   = {locked:false,winnerIdx:null,weekNum:1,startedAt:fmt(new Date())};
let subs    = [];   // [{name,giphyId,tagline,at}]
let votes   = {};   // {gifIdx: count}
let archive = [];
let isAdmin = false;
let curTab  = 's';

// Per-browser personal data
function myVotes(){ return lsGet('gotw_my_votes',[]);}  // array of gif indices voted for
function mySubCount(){
  const myName = lsGet('gotw_my_name','').toLowerCase();
  if(!myName) return 0;
  return subs.filter(s=>s.name.toLowerCase()===myName).length;
}

async function loadAll(){
  // Single fetch for all data (efficient with JSONBin)
  const data = await dbFetch();
  const s=data.subs, v=data.votes, st=data.state, ar=data.archive;
  subs=Array.isArray(s)?s:[];
  votes=(v&&typeof v==='object')?v:{};
  archive=Array.isArray(ar)?ar:[];
  if(st&&typeof st==='object') state=st;
  renderSubList();
  updateSubLimitMsg();
  if(curTab==='v') renderVote();
  if(curTab==='a') renderArchive();
  if(curTab==='x'&&isAdmin) renderAdmin();
  if(state.locked){ document.querySelector('.ts').style.display='none'; }
}

// ══════════════════════════════════════════════════════════
//  MODAL (replaces confirm/alert — works in all sandboxes)
// ══════════════════════════════════════════════════════════
let pendingYes=null;
function showModal(icon,title,msg,yesLabel,onYes){
  document.getElementById('modal-icon').textContent=icon;
  document.getElementById('modal-title').textContent=title;
  document.getElementById('modal-msg').textContent=msg;
  document.getElementById('modal-yes').textContent='✓ '+(yesLabel||'Confirm');
  pendingYes=onYes;
  document.getElementById('modal').style.display='flex';
}
function closeModal(){ document.getElementById('modal').style.display='none'; pendingYes=null; }

// ══════════════════════════════════════════════════════════
//  TABS
// ══════════════════════════════════════════════════════════
function switchTab(tab){
  curTab=tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.tab===tab));
  ['s','v','a','x'].forEach(id=>{
    const el=document.getElementById('screen-'+id);
    if(el) el.classList.toggle('active',id===tab);
  });
  if(tab==='v') renderVote();
  if(tab==='a') renderArchive();
  if(tab==='x') isAdmin?renderAdmin():renderAdminLogin();
}

// ══════════════════════════════════════════════════════════
//  SUBMIT
// ══════════════════════════════════════════════════════════
function updateSubLimitMsg(){
  const el=document.getElementById('sub-limit-msg'); if(!el) return;
  if(state.locked){ el.textContent='Submissions are closed.'; return; }
  const myName=lsGet('gotw_my_name','').toLowerCase();
  if(!myName){ el.innerHTML='You can submit up to <strong>'+MAX_SUBS+'</strong> GIFs'; return; }
  const count=subs.filter(s=>s.name.toLowerCase()===myName).length;
  const left=MAX_SUBS-count;
  el.innerHTML=left>0
    ?`${count} submitted — <strong>${left}</strong> remaining`
    :`<span style="color:var(--r1)">Max submissions reached (${MAX_SUBS})</span>`;
}

async function doSubmit(){
  const name=document.getElementById('in-name').value.trim();
  const rawUrl=document.getElementById('in-url').value.trim();
  const tagline=document.getElementById('in-tag').value.trim();
  const errEl=document.getElementById('sub-err');
  const id=giphyId(rawUrl);

  errEl.style.display='none';
  if(!name){errEl.textContent='Please enter your name.';errEl.style.display='block';return;}
  if(!id){errEl.textContent='Paste a valid giphy.com link (e.g. https://giphy.com/gifs/…).';errEl.style.display='block';return;}
  if(!tagline){errEl.textContent='Please add a tagline.';errEl.style.display='block';return;}
  if(state.locked){errEl.textContent='Submissions are locked — voting has started!';errEl.style.display='block';return;}

  const myCount=subs.filter(s=>s.name.toLowerCase()===name.toLowerCase()).length;
  if(myCount>=MAX_SUBS){errEl.textContent=`Max ${MAX_SUBS} submissions per person!`;errEl.style.display='block';return;}

  lsSet('gotw_my_name',name);
  const btn=document.getElementById('btn-submit');
  btn.innerHTML='<span class="spinner"></span> SUBMITTING…'; btn.disabled=true;
  subs.push({name,giphyId:id,tagline,at:Date.now()});
  try {
    await dbSet('subs',subs);
    btn.innerHTML='✓ SUBMITTED!';
    document.getElementById('in-url').value='';
    document.getElementById('in-tag').value='';
    previewGif('');
    updateSubLimitMsg();
    setTimeout(()=>{btn.innerHTML='SUBMIT GIF';btn.disabled=false;},2200);
    renderSubList();
  } catch(e) {
    subs.pop(); // roll back
    btn.innerHTML='SUBMIT GIF'; btn.disabled=false;
    const errEl=document.getElementById('sub-err');
    errEl.textContent='⚠ Could not save — check your connection and try again.';
    errEl.style.display='block';
  }
}

function renderSubList(){
  const el=document.getElementById('sub-list'); if(!el) return;
  if(!subs.length){el.innerHTML='<div class="empty"><span class="ico">📭</span>No submissions yet this week</div>';return;}
  el.innerHTML=subs.map((s,i)=>`
    <div class="sub-row sub-stripe-${i%8}">
      <div class="sub-th ${state.locked?'':'hid'}" style="position:relative">${state.locked?gifEmbed(s.giphyId):'🎞️'}</div>
      <div class="sub-info">
        <div class="sub-tl">${state.locked?esc(s.tagline):'[ hidden ]'}</div>
        <div class="sub-mt">by ${esc(s.name)}</div>
      </div>
      <span class="sub-n">#${i+1}</span>
    </div>`).join('');
}

function previewGif(raw){
  const box=document.getElementById('gif-prev'); if(!box) return;
  const id=giphyId(raw);
  if(id){
    box.innerHTML=gifEmbed(id);
  } else if((raw||'').trim()){
    box.innerHTML='<div class="prev-ph"><span class="ico">❓</span>Couldn\'t parse that Giphy link<br><small style="font-size:11px">Try: giphy.com/gifs/… or media.giphy.com/…</small></div>';
  } else {
    box.innerHTML='<div class="prev-ph"><span class="ico">🎞️</span>Paste a Giphy link above to preview</div>';
  }
}

// ══════════════════════════════════════════════════════════
//  VOTE
// ══════════════════════════════════════════════════════════
function renderVote(){
  const el=document.getElementById('vote-content'); if(!el) return;
  if(!state.locked){el.innerHTML='<div class="notice na"><span>🔒</span><span>GIFs are hidden until the host opens voting.</span></div>';return;}
  const myVotesArr=myVotes();
  const votesLeft=MAX_VOTES-myVotesArr.length;

  if(state.winnerIdx!==null){
    const w=subs[state.winnerIdx];
    const total=Object.values(votes).reduce((a,b)=>a+b,0);
    el.innerHTML=`
      <div class="win-card">
        <div class="win-banner"><span>🏆 THIS WEEK'S WINNER!</span></div>
        <div class="win-frame" style="position:relative">${gifEmbed(w.giphyId)}</div>
        <div class="win-body"><div class="win-tl">${esc(w.tagline)}</div>
        <div class="win-mt">by ${esc(w.name)} · ${votes[state.winnerIdx]||0} vote${(votes[state.winnerIdx]||0)!==1?'s':''} · ${total} total</div></div>
      </div>
      <p class="lbl">All entries</p>
      <div class="gif-grid">${subs.map((s,i)=>{
        const v=votes[i]||0,isW=i===state.winnerIdx;
        return `<div class="gif-card ${isW?'won':''}">
          <div class="gif-card-th" style="position:relative">${gifEmbed(s.giphyId)}</div>
          <span class="pill ${isW?'pg':'pb'}">${isW?'🏆 ':''}${v}v</span>
          <div class="gif-card-body"><div class="gif-card-tl">${esc(s.tagline)}</div><div class="gif-card-mt">by ${esc(s.name)}</div></div>
        </div>`;
      }).join('')}</div>`;
    return;
  }

  const dots=Array.from({length:MAX_VOTES},(_,i)=>`<span class="vote-dot ${i<myVotesArr.length?'used':''}"></span>`).join('');
  el.innerHTML=`
    <div class="vote-budget">
      <span style="font-weight:500">${votesLeft>0?`${votesLeft} vote${votesLeft!==1?'s':''} remaining`:'All votes cast!'}</span>
      <div class="vote-dots">${dots}</div>
    </div>
    ${myVotesArr.length===MAX_VOTES?`<div class="notice nok"><span>✅</span><span>You've used both votes. Tap a voted GIF to remove a vote.</span></div>`:''}
    <div class="gif-grid">${subs.map((s,i)=>{
      const voteIdx=myVotesArr.indexOf(i);
      const hasVote=voteIdx!==-1;
      const voteNum=hasVote?voteIdx+1:null;
      const cls=voteNum===1?'voted':voteNum===2?'voted2':'';
      const pillLabel=voteNum===1?'Vote 1 ✓':voteNum===2?'Vote 2 ✓':'';
      const pillCls=voteNum===1?'pb':voteNum===2?'pm':'';
      return `<div class="gif-card ${cls}" data-vote="${i}">
        <div class="gif-card-th" style="position:relative">${gifEmbed(s.giphyId)}</div>
        ${hasVote?`<span class="pill ${pillCls}">${pillLabel}</span>`:''}
        <div class="gif-card-body"><div class="gif-card-tl">${esc(s.tagline)}</div><div class="gif-card-mt">by ${esc(s.name)}</div></div>
      </div>`;
    }).join('')}</div>`;
}

async function doVote(idx){
  const mv=myVotes();
  const alreadyIdx=mv.indexOf(idx);
  const prevVotes={...votes};
  const prevMv=[...mv];
  if(alreadyIdx!==-1){
    mv.splice(alreadyIdx,1);
    votes[idx]=Math.max(0,(votes[idx]||0)-1);
  } else {
    if(mv.length>=MAX_VOTES) return;
    mv.push(idx);
    votes[idx]=(votes[idx]||0)+1;
  }
  lsSet('gotw_my_votes',mv);
  renderVote(); // optimistic update
  try {
    await dbSet('votes',votes);
  } catch(e) {
    // Roll back
    Object.assign(votes,prevVotes);
    lsSet('gotw_my_votes',prevMv);
    renderVote();
  }
}

// ══════════════════════════════════════════════════════════
//  ARCHIVE
// ══════════════════════════════════════════════════════════
function renderArchive(){
  const el=document.getElementById('arc-content'); if(!el) return;
  if(!archive.length){el.innerHTML='<div class="empty"><span class="ico">📚</span>No archived weeks yet</div>';return;}
  el.innerHTML=archive.map(w=>{
    const total=Object.values(w.votes||{}).reduce((a,b)=>a+b,0);
    return `<div class="arc-week">
      <div class="arc-hdr"><span class="arc-title">WEEK ${w.weekNum}</span><span class="arc-date">${w.startedAt} · ${w.subs.length} entr${w.subs.length!==1?'ies':'y'} · ${total}v</span></div>
      ${w.winner
        ?`<div class="arc-winner"><div class="arc-th" style="position:relative">${gifEmbed(w.winner.giphyId)}</div><div><div class="aw-lbl">🏆 Winner</div><div class="aw-tl">${esc(w.winner.tagline)}</div><div class="aw-nm">by ${esc(w.winner.name)}</div></div></div>`
        :`<div style="padding:12px 14px;font-size:13px;color:var(--muted)">No winner declared</div>`}
    </div>`;
  }).join('');
}

// ══════════════════════════════════════════════════════════
//  ADMIN
// ══════════════════════════════════════════════════════════
function renderAdminLogin(){
  document.getElementById('adm-content').innerHTML=`
    <div class="login-wrap"><div class="login-card">
      <span class="ico">🔐</span>
      <h2>ADMIN ACCESS</h2>
      <p>Enter the host PIN to manage this week's session</p>
      <input type="password" id="pin-in" placeholder="PIN" style="text-align:center;letter-spacing:.2em;font-size:18px">
      <p class="err" id="pin-err" style="text-align:center;margin-bottom:8px"></p>
      <button class="cta cr" id="btn-unlock">UNLOCK</button>
    </div></div>`;
}

function tryUnlock(){
  const pinEl=document.getElementById('pin-in');
  const errEl=document.getElementById('pin-err');
  if(!pinEl) return;
  if(pinEl.value===HOST_PASS){
    isAdmin=true; lsSet('gotw_host',HOST_PASS);
    document.getElementById('tab-x').style.display='';
    document.getElementById('tabs').classList.replace('t3','t4');
    renderAdmin();
  } else {
    if(errEl){errEl.textContent='Wrong PIN — try again';errEl.style.display='block';}
    pinEl.value='';
  }
}

function renderAdmin(){
  if(!isAdmin){renderAdminLogin();return;}
  const total=Object.values(votes).reduce((a,b)=>a+b,0);
  const sc=!state.locked?['sc-open','📬 Collecting submissions']
    :state.winnerIdx!==null?['sc-done','🏆 Winner declared']
    :['sc-vote','🗳️ Voting open'];
  document.getElementById('adm-content').innerHTML=`
    <div class="adm">
      <div class="adm-hdr"><div class="adm-hdr-t">⚙ ADMIN — WEEK ${state.weekNum}</div></div>
      <div class="adm-sec">
        <div class="adm-sec-t">At a glance</div>
        <div class="stat-row">
          <div class="stat-box sb1"><div class="stat-n">${subs.length}</div><div class="stat-l">Submissions</div></div>
          <div class="stat-box sb2"><div class="stat-n">${total}</div><div class="stat-l">Votes cast</div></div>
          <div class="stat-box sb3"><div class="stat-n">${archive.length}</div><div class="stat-l">Past weeks</div></div>
        </div>
        <span class="status-chip ${sc[0]}">${sc[1]}</span>
        ${state.locked&&state.winnerIdx===null&&subs.length?`<p style="font-size:12px;color:var(--muted);margin-top:10px">Votes: ${subs.map((s,i)=>`${esc(s.name)}: <strong>${votes[i]||0}</strong>`).join(' · ')}</p>`:''}
      </div>
      <div class="adm-sec">
        <div class="adm-sec-t">Session controls</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          ${!state.locked
            ?`<button class="btn bw" id="adm-btn-lock">🔒 Lock &amp; open voting</button>`
            :state.winnerIdx===null
              ?`<button class="btn bg" id="adm-btn-winner">🏆 Declare winner</button>`
              :``}
          ${state.winnerIdx!==null||state.locked
            ?`<button class="btn bp" id="adm-btn-newweek">📅 Start new week</button>`:''}
        </div>
      </div>
      <div class="adm-sec">
        <div class="adm-sec-t">Submissions (${subs.length})</div>
        ${subs.length?subs.map((s,i)=>`
          <div class="sub-row sub-stripe-${i%8}">
            <div class="sub-th" style="position:relative">${gifEmbed(s.giphyId)}</div>
            <div class="sub-info"><div class="sub-tl">${esc(s.tagline)}</div><div class="sub-mt">by ${esc(s.name)} · ${votes[i]||0}v</div></div>
            <button class="btn bd" data-remove="${i}" style="padding:5px 10px;font-size:11px">✕</button>
          </div>`).join('')
          :'<div style="color:var(--muted);font-size:13px;padding:4px 0">No submissions yet</div>'}
      </div>
    </div>`;
}

// Admin actions — use modal overlay, never confirm/alert
async function adminLock(){
  if(!subs.length){showModal('⚠️','No submissions','There are no submissions yet — nothing to lock.',null,null);document.getElementById('modal-yes').style.display='none';setTimeout(closeModal,2500);return;}
  showModal('🔒','Lock & open voting',`Lock ${subs.length} submission${subs.length!==1?'s':''} and open voting? Submissions tab will close.`,'Lock it!',async()=>{
    state.locked=true; await dbSet('state',state);
    renderSubList(); renderAdmin();
    document.querySelector('.ts').style.display='none';
    switchTab('v');
  });
}
async function adminDeclareWinner(){
  const vv=Object.values(votes);
  if(!vv.some(v=>v>0)){
    showModal('🗳️','No votes yet','No one has voted yet. Wait for the team to cast their votes first.',null,null);
    document.getElementById('modal-yes').style.display='none';
    setTimeout(closeModal,2500); return;
  }
  let maxV=-1,winIdx=0;
  subs.forEach((_,i)=>{if((votes[i]||0)>maxV){maxV=votes[i]||0;winIdx=i;}});
  showModal('🏆','Declare winner',`Declare GIF #${winIdx+1} "${subs[winIdx].tagline}" as winner with ${maxV} vote${maxV!==1?'s':''}?`,'Crown them!',async()=>{
    state.winnerIdx=winIdx; await dbSet('state',state);
    renderAdmin(); renderVote();
  });
}
async function adminNewWeek(){
  showModal('📅','Start new week','This will archive the current week and open fresh submissions. The winner stays in the archive.',`Start week ${state.weekNum+1}`,async()=>{
    archive.unshift({weekNum:state.weekNum,startedAt:state.startedAt,subs:[...subs],votes:{...votes},winnerIdx:state.winnerIdx,winner:state.winnerIdx!==null?{...subs[state.winnerIdx]}:null});
    state={locked:false,winnerIdx:null,weekNum:state.weekNum+1,startedAt:fmt(new Date())};
    subs=[]; votes={}; lsSet('gotw_my_votes',[]); lsSet('gotw_myvote',null);
    await Promise.all([dbSet('state',state),dbSet('subs',subs),dbSet('votes',votes),dbSet('archive',archive)]);
    document.querySelector('.ts').style.display='';
    updateSubLimitMsg(); renderSubList(); renderAdmin();
    switchTab('s');
  });
}
async function adminRemoveSub(idx){
  showModal('🗑️','Remove submission',`Remove "${subs[idx].tagline}" by ${subs[idx].name}?`,'Remove',async()=>{
    subs.splice(idx,1);
    const nv={}; subs.forEach((_,i)=>{nv[i]=votes[i+1<=idx?i:i+1]||0;}); votes=nv;
    if(state.winnerIdx!==null){if(state.winnerIdx===idx)state.winnerIdx=null;else if(state.winnerIdx>idx)state.winnerIdx--;}
    await Promise.all([dbSet('subs',subs),dbSet('votes',votes),dbSet('state',state)]);
    renderSubList(); renderAdmin();
  });
}

// ══════════════════════════════════════════════════════════
//  SINGLE EVENT DELEGATION — ALL CLICKS
// ══════════════════════════════════════════════════════════
document.addEventListener('click',function(e){
  const t=e.target.closest('[data-tab],[data-vote],[data-remove],button')||e.target;

  // Modal buttons
  if(t.id==='modal-yes'){if(pendingYes){const a=pendingYes;pendingYes=null;closeModal();a();}return;}
  if(t.id==='modal-no'){closeModal();return;}
  if(t.closest('#modal')&&t.id!=='modal-yes'&&t.id!=='modal-no') return;

  // Close modal on backdrop click
  if(t.id==='modal'){closeModal();return;}

  // Tabs
  if(t.dataset&&t.dataset.tab!==undefined){switchTab(t.dataset.tab);return;}

  // Go to admin (from submit screen link)
  if(t.id==='btn-goto-admin'){
    document.getElementById('tab-x').style.display='';
    document.getElementById('tabs').classList.replace('t3','t4');
    switchTab('x'); return;
  }

  // Submit
  if(t.id==='btn-submit'){doSubmit();return;}

  // Vote cards
  if(t.dataset&&t.dataset.vote!==undefined&&t.closest('#vote-content')){doVote(parseInt(t.dataset.vote));return;}

  // PIN unlock
  if(t.id==='btn-unlock'){tryUnlock();return;}

  // Admin buttons
  if(t.id==='adm-btn-lock'){adminLock();return;}
  if(t.id==='adm-btn-winner'){adminDeclareWinner();return;}
  if(t.id==='adm-btn-newweek'){adminNewWeek();return;}

  // Remove submission
  if(t.dataset&&t.dataset.remove!==undefined){adminRemoveSub(parseInt(t.dataset.remove));return;}
});

document.addEventListener('keydown',function(e){
  if(e.key==='Escape') closeModal();
  if(e.key==='Enter'&&document.activeElement&&document.activeElement.id==='pin-in') tryUnlock();
});

document.addEventListener('input',function(e){
  if(e.target.id==='in-url') previewGif(e.target.value);
});

// ══════════════════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════════════════
(function init(){
  if(lsGet('gotw_host',null)===HOST_PASS){
    isAdmin=true;
    document.getElementById('tab-x').style.display='';
    document.getElementById('tabs').classList.replace('t3','t4');
  }
  loadAll().then(()=>{
    if(state.locked){
      document.querySelector('.ts').style.display='none';
      if(curTab==='s') switchTab('v');
    }
    updateSubLimitMsg();
  });
  setInterval(loadAll,15000);
})();
</script>
